name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          targets="linux/amd64 linux/arm64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            echo "building $os/$arch"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/arch-update-notes-${VERSION}-${os}-${arch}" .
          done
          cd dist
          sha256sum arch-update-notes-* > SHA256SUMS
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/arch-update-notes-*
            dist/SHA256SUMS
